  <h1>题目 #505（共 890 题）<br>“3秒法则”如何计算？</h1>

  

  <ul>
    <li class="opt">A. 仅观察前车刹车灯</li>
<li class="opt correct">B. 当前车经过固定物体时开始计数，到自己到达同一物体时计数</li>
<li class="opt">C. 从自己车头到前车尾的距离</li>
  </ul>

  <div class="answer-box">
    <strong>✅ 正确答案：B. 当前车经过固定物体时开始计数，到自己到达同一物体时计数</strong>
  </div>

  <div class="exp-box"><strong>解析：</strong> 选择路边固定参考点（如标志或树），前车经过时开始计数，到自己经过同一参考点至少3秒。</div>
