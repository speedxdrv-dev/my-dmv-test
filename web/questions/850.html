  <h1>题目 #776（共 890 题）<br>路面刚开始下雨时，为什么最容易打滑？</h1>

  

  <ul>
    <li class="opt">A. 因为雨水温度低使轮胎硬化</li>
<li class="opt correct">B. 因为油污和尘土浮起形成滑腻层</li>
<li class="opt">C. 因为轮胎花纹积水形成水膜</li>
  </ul>

  <div class="answer-box">
    <strong>✅ 正确答案：B. 因为油污和尘土浮起形成滑腻层</strong>
  </div>

  <div class="exp-box"><strong>解析：</strong> 雨刚开始时，路面油污、尘土和橡胶颗粒被雨水浮起，形成极滑的混合层。DMV手册强调：路面刚湿时最危险，需大幅减速并增加跟车距离。几分钟后雨水冲刷干净后才逐渐好转。</div>
