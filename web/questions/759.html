  <h1>题目 #685（共 890 题）<br>情景：在雨天狭窄山路下坡，你与上坡车辆会车无法通过，路面泥泞，你应该怎么做？</h1>

  

  <ul>
    <li class="opt">A. 停车鸣笛让对方倒车</li>
<li class="opt correct">B. 倒车后退，让上坡车辆先行通过</li>
<li class="opt">C. 坚持前进</li>
  </ul>

  <div class="answer-box">
    <strong>✅ 正确答案：B. 倒车后退，让上坡车辆先行通过</strong>
  </div>

  <div class="exp-box"><strong>解析：</strong> 雨天泥泞路面时，下坡车辆必须让上坡车辆先行（DMV手册山路规则）。泥泞增加倒车难度，但下坡车辆责任后退。未让行可能导致卡住或事故。</div>
