  <h1>题目 #777（共 890 题）<br>发生水漂（Hydroplaning）时，车辆失去抓地力，你应该怎么做？</h1>

  

  <ul>
    <li class="opt correct">A. 松开油门和刹车，保持方向盘直行直到恢复抓地</li>
<li class="opt">B. 急踩刹车并挂低挡</li>
<li class="opt">C. 猛踩刹车并急转方向盘</li>
  </ul>

  <div class="answer-box">
    <strong>✅ 正确答案：A. 松开油门和刹车，保持方向盘直行直到恢复抓地</strong>
  </div>

  <div class="exp-box"><strong>解析：</strong> 水漂时轮胎被水膜托起失去抓地。DMV手册指示：不要刹车（会锁死轮胎）、不要急转方向盘。正确做法是松开油门和刹车，保持方向盘直行，等待速度降低、水膜消失后轮胎重新抓地。急刹或急转极易失控翻车。</div>
