  <h1>题目 #658（共 890 题）<br>情景：你在无信号灯路口右转，左侧有一辆车直行接近，你应该怎么做？</h1>

  

  <ul>
    <li class="opt">A. 鸣笛让左侧车辆停下</li>
<li class="opt">B. 抢先右转通过，因为右转优先</li>
<li class="opt correct">C. 停车让左侧直行车辆先行</li>
  </ul>

  <div class="answer-box">
    <strong>✅ 正确答案：C. 停车让左侧直行车辆先行</strong>
  </div>

  <div class="exp-box"><strong>解析：</strong> 在无控制路口，右转车辆必须让左侧直行车辆先行（CVC 21800）。直行车辆有优先权，你必须停车观察，确保左侧直行车辆通过后才能右转。即使你已打右转向灯，也不能抢行。未让行直行车辆可能导致侧撞事故，并被判定为未让行。</div>
