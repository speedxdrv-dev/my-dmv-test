  <h1>题目 #93（共 890 题）<br>如果在单车道山路上，有 5 辆或更多的车跟在您后面，您必须：</h1>

  

  <ul>
    <li class="opt">A. 继续保持速度</li>
<li class="opt">B. 加速</li>
<li class="opt correct">C. 在安全的避让区（Turnout）驶出并让行</li>
  </ul>

  <div class="answer-box">
    <strong>✅ 正确答案：C. 在安全的避让区（Turnout）驶出并让行</strong>
  </div>

  <div class="exp-box"><strong>解析：</strong> 加州法律规定：如果它是单车道且因您速度慢导致压车 5 辆以上，您必须靠边让行。</div>
